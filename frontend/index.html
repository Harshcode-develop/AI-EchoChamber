<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5" />

    <!-- Primary Meta Tags -->
    <title>EchoChamber – AI Content Repurposing for Creators</title>
    <meta name="title" content="EchoChamber – AI Content Repurposing for Creators" />
    <meta name="description" content="Transform your video content into platform-ready posts for LinkedIn, X, Instagram, YouTube, and Blog in seconds with AI-powered content repurposing." />
    <meta name="keywords" content="AI content repurposing, video to text, social media content, content creator tools, LinkedIn post generator, X thread generator, Instagram caption, YouTube description, blog writer, AI writing" />
    <meta name="author" content="EchoChamber" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#8B5CF6" />
    <link rel="canonical" href="https://echochamber.ai/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://echochamber.ai/" />
    <meta property="og:title" content="EchoChamber – AI Content Repurposing for Creators" />
    <meta property="og:description" content="Upload your video and instantly create engaging content for 5 platforms at once. AI-powered, lightning fast, brand-voice aware." />
    <meta property="og:site_name" content="EchoChamber" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://echochamber.ai/" />
    <meta property="twitter:title" content="EchoChamber – AI Content Repurposing for Creators" />
    <meta property="twitter:description" content="Upload your video and instantly create engaging content for 5 platforms at once. AI-powered, lightning fast, brand-voice aware." />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "EchoChamber",
      "description": "AI-powered content repurposing platform that transforms video content into platform-ready posts for LinkedIn, X, Instagram, YouTube, and Blog.",
      "url": "https://echochamber.ai",
      "applicationCategory": "Content Creation",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free tier with 1 generation. Sign up for 3 daily generations."
      }
    }
    </script>

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Preload critical font -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
